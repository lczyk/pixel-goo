name: release

# Build every binary on each platform and publish them to the GitHub Release for
# a pushed semver tag (v1.2.3, or v1.2.3-rc1 for a pre-release). GOO_VERSION is set
# to the tag so the binaries report it via `--version`.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos: arm64 only (macos-14 is an arm runner).
          - os: macos-14
            label: macos-arm64
            targets: build build-macwp
          # linux: build on 22.04 (older glibc) so the binaries run on more distros.
          - os: ubuntu-22.04
            label: linux-x86_64
            targets: build build-wlwp build-x11wp
    runs-on: ${{ matrix.os }}
    env:
      GOO_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: install linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev libxrandr-dev libgl1-mesa-dev \
            libwayland-dev libegl-dev libwayland-bin

      - name: build
        run: |
          mkdir -p bin
          cc -o bin/nob nob.c
          for t in ${{ matrix.targets }}; do
            ./bin/nob "$t"
          done

      - name: stage binaries
        run: |
          mkdir -p dist
          for f in bin/goo bin/goo-macwp bin/goo-wlwp bin/goo-x11wp; do
            [ -f "$f" ] && cp "$f" "dist/$(basename "$f")-${GOO_VERSION}-${{ matrix.label }}"
          done
          ls -l dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
