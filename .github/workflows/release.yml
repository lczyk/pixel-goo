name: release

# Build every binary on each platform and publish them to the GitHub Release for
# a pushed semver tag (v1.2.3, or v1.2.3-rc1 for a pre-release). GOO_VERSION is set
# to the tag so the binaries report it via `--version`.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos: arm64 only (macos-14 is an arm runner).
          - os: macos-14
            label: macos-arm64
            targets: build build-macwp
          # linux: build on 22.04 (older glibc) so the binaries run on more distros.
          - os: ubuntu-22.04
            label: linux-x86_64
            targets: build build-wlwp build-x11wp
    runs-on: ${{ matrix.os }}
    env:
      GOO_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - name: install linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev libgl1-mesa-dev \
            libwayland-dev libegl-dev libwayland-bin

      - name: build
        run: |
          mkdir -p bin
          cc -o bin/nob nob.c
          for t in ${{ matrix.targets }}; do
            ./bin/nob "$t"
          done

      - name: stage binaries
        # tar each binary: github strips the +x bit off raw assets (upload-artifact zips
        # without unix perms), but tar preserves it, so `tar xf` yields a runnable executable.
        run: |
          mkdir -p dist
          for f in bin/goo bin/goo-macwp bin/goo-wlwp bin/goo-x11wp; do
            [ -f "$f" ] || continue
            b=$(basename "$f")
            chmod +x "$f"
            tar -czf "dist/${b}-${GOO_VERSION}-${{ matrix.label }}.tar.gz" -C bin "$b"
          done
          ls -l dist

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      # official github cli (preinstalled) -- no maintained actions/* release action exists.
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          prerelease=
          case "${{ github.ref_name }}" in *-*) prerelease=--prerelease ;; esac
          gh release create "${{ github.ref_name }}" dist/* \
            --generate-notes $prerelease

  # push the new version to the homebrew tap so `brew upgrade goo` picks it up.
  # build-from-source formula, so the bump is just the archive url tag + its sha256.
  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    # stable tags only -- prereleases (v1.2.3-rc1) don't touch the stable formula.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # TAP_PUSH_TOKEN: lczyk-bot PAT/app token with contents:write on the tap repo.
      - uses: actions/checkout@v5
        with:
          repository: lczyk/homebrew-pixel-goo
          token: ${{ secrets.TAP_PUSH_TOKEN }}

      - name: bump formula
        env:
          TAG: ${{ github.ref_name }}
          SRC_REPO: lczyk/pixel-goo
        run: |
          url="https://github.com/${SRC_REPO}/archive/refs/tags/${TAG}.tar.gz"
          sha=$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)
          echo "tag=${TAG} sha=${sha}"
          sed -i -E \
            -e "s|(/archive/refs/tags/)v[0-9]+\.[0-9]+\.[0-9]+(\.tar\.gz)|\1${TAG}\2|" \
            -e "s|(sha256 \")[0-9a-f]{64}(\")|\1${sha}\2|" \
            Formula/goo.rb

      - name: commit and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if git diff --quiet; then
            echo "formula already at ${TAG}, nothing to do"
            exit 0
          fi
          git config user.name lczyk-bot
          git config user.email lczyk-bot@users.noreply.github.com
          git commit -am "goo ${TAG#v}"
          git push
