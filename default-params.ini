# default-params.ini -- source of truth for goo's default config.
#
# nob.c parses this at build time and bakes each `key = value` into the binary
# as the first option layer; stdin config (`goo -`) and cli flags override it.
# so `cat default-params.ini | goo - ...` == `goo - ...` == `goo ...`. edit a
# value here, rebuild, and the default changes -- no C edit needed.
#
# keys are dropt long-flag names (see --help). only value flags live here; bool
# toggles (windowed, no-vsync, profile, ...) default off and are set on the cli.

# display
monitor = 0
width = 800
height = 600
# fps: 0 = uncapped. vsync (default) already paces to the target monitor's
# refresh; a fixed cap here would override that (e.g. pin a 120Hz panel to 60).
# leave 0 and let vsync pace; only --no-vsync actually free-runs.
fps = 0

# particles
density = 0.015
render-scale = 4.0
seed = 0
init-warp = 0.13
drag = 0.19
dither = 0.025
dither-gain = 8.5
dither-ortho = 0.05
dens-force = 0.005
trail-force = 0.05
repel = 0.11
reach = 20
anti-stick = 7
trail-reach = 30
cull = 0.8

# colormap
gamma = 0.6
headroom = 0.0
headroom-margin = 1.15
headroom-attack = 0.05
headroom-release = 0.02
headroom-pct = 0.98

# density / trail
dens-alpha = 0.005
dens-kernel = 30
trail-intensity = 0.06
trail-tau = 6.15
trail-kernel = 15
trail-floor = 0.6
dens-sub = 4
dens-downsample = 20
repel-downsample = 20
dens-every = 3
trail-sub = 2
trail-downsample = 10
trail-every = 2
sort-every = 8
